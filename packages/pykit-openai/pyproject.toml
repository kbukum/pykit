[project]
name = "pykit-openai"
description = "OpenAI vendor module — LLM and embedding providers for OpenAI-compatible APIs"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "httpx",
    "pykit-llm",
    "pykit-embedding",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pykit_openai"]
