[project]
name = "pykit-worker"
description = "Background worker and task processing"
version = "0.1.0"
readme = "README.md"
license = { text = "MIT" }
keywords = ["worker", "background", "tasks", "async"]
requires-python = ">=3.13"
dependencies = [
    "pykit-errors",
    "pykit-component",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pykit_worker"]
