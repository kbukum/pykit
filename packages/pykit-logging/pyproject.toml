[project]
name = "pykit-logging"
description = "Structured logging with structlog integration"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "structlog",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pykit_logging"]
