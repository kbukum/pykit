[project]
name = "pykit-dataset"
description = "Dataset collection, transformation, and publishing"
version = "0.1.0"
readme = "README.md"
license = { text = "MIT" }
keywords = ["dataset", "data", "transformation", "publishing"]
requires-python = ">=3.13"
dependencies = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pykit_dataset"]

[project.optional-dependencies]
huggingface = [
    "datasets",
    "huggingface-hub",
    "Pillow",
]
kaggle = [
    "kagglehub",
]
web = [
    "httpx",
    "Pillow",
]
all = [
    "datasets",
    "huggingface-hub",
    "kagglehub",
    "httpx",
    "Pillow",
]
