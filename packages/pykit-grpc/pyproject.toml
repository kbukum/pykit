[project]
name = "pykit-grpc"
description = "gRPC client utilities and helpers"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "grpcio",
    "pykit-errors",
    "pykit-component",
    "pykit-discovery",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pykit_grpc"]
