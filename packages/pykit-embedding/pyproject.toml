[project]
name = "pykit-embedding"
description = "Text and vector embedding utilities"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "numpy",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pykit_embedding"]
