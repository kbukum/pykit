[project]
name = "pykit-metrics"
description = "Prometheus metrics helpers"
version = "0.1.0"
readme = "README.md"
license = { text = "MIT" }
keywords = ["metrics", "prometheus", "observability", "monitoring"]
requires-python = ">=3.13"
dependencies = [
    "prometheus-client",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pykit_metrics"]
