[project]
name = "pykit-explain"
description = "Structured explanation generation from analysis signals using LLMs"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "pykit-llm",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pykit_explain"]
