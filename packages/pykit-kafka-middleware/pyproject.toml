[project]
name = "pykit-kafka-middleware"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "pykit-messaging[kafka]",
    "pykit-resilience",
    "opentelemetry-api",
    "prometheus-client",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pykit_kafka_middleware"]
