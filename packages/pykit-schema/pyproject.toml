[project]
name = "pykit-schema"
description = "JSON Schema generation from Python types and Pydantic models"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "pydantic>=2.12",
    "jsonschema>=4.23",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pykit_schema"]
