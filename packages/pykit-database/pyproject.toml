[project]
name = "pykit-database"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "sqlalchemy[asyncio]",
    "pykit-errors",
    "pykit-component",
]

[project.optional-dependencies]
test = ["aiosqlite"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pykit_database"]
