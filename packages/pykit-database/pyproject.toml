[project]
name = "pykit-database"
description = "Async database abstraction with SQLAlchemy backend and explicit driver extras"
version = "0.1.0"
readme = "README.md"
license = { text = "MIT" }
keywords = ["database", "sqlalchemy", "async", "orm"]
requires-python = ">=3.13"
dependencies = [
    "sqlalchemy[asyncio]",
    "pykit-errors",
    "pykit-component",
]

[project.optional-dependencies]
postgres = ["asyncpg"]
sqlite = ["aiosqlite"]
test = ["aiosqlite"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pykit_database"]
