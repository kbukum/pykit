[project]
name = "pykit-media"
description = "Media type detection and handling"
version = "0.1.0"
readme = "README.md"
license = { text = "MIT" }
keywords = ["media", "mime", "content-type", "file"]
requires-python = ">=3.13"
dependencies = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pykit_media"]
