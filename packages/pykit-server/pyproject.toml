[project]
name = "pykit-server"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "pykit-component",
    "pykit-errors",
    "pykit-logging",
    "grpcio",
    "grpcio-health-checking",
    "grpcio-reflection",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pykit_server"]
