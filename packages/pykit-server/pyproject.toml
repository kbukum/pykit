[project]
name = "pykit-server"
description = "gRPC server bootstrap and folded transport middleware"
version = "0.1.0"
readme = "README.md"
license = { text = "MIT" }
keywords = ["grpc", "server", "health", "interceptors"]
requires-python = ">=3.13"
dependencies = [
    "pykit-component",
    "pykit-errors",
    "pykit-logging",
    "pykit-observability",
    "pykit-resilience",
    "grpcio",
    "grpcio-health-checking",
    "grpcio-reflection",
    "opentelemetry-api",
    "prometheus-client",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pykit_server"]
