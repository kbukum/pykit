[project]
name = "pykit-redis"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "redis",
    "pykit-errors",
    "pykit-component",
]

[project.optional-dependencies]
test = ["fakeredis"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pykit_redis"]
