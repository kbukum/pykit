[project]
name = "pykit-bench"
description = "Generic accuracy benchmarking framework"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "pydantic",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pykit_bench"]
