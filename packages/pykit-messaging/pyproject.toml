[project]
name = "pykit-messaging"
version = "0.1.0"
readme = "README.md"
license = { text = "MIT" }
keywords = ["messaging", "kafka", "async", "broker"]
description = "Transport-agnostic messaging abstractions with Kafka provider"
requires-python = ">=3.13"
dependencies = [
    "pykit-errors",
    "pykit-component",
    "pykit-util",
    "opentelemetry-api",
    "prometheus-client",
]

[project.optional-dependencies]
kafka = ["aiokafka", "cramjam"]
bridges = ["pykit-provider", "pykit-pipeline", "pykit-dag", "pykit-worker"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pykit_messaging"]
