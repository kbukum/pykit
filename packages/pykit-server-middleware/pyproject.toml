[project]
name = "pykit-server-middleware"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "opentelemetry-api",
    "prometheus-client",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pykit_server_middleware"]
