[project]
name = "pykit-di"
description = "Dependency injection container with eager, lazy, and singleton modes"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "pykit-errors",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pykit_di"]
