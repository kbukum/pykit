[project]
name = "pykit-httpclient"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "httpx",
    "pykit-errors",
    "pykit-resilience",
    "pykit-component",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pykit_httpclient"]
