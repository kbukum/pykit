[project]
name = "pykit-testutil"
description = "Test utilities for gRPC services"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "grpcio",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pykit_testutil"]
