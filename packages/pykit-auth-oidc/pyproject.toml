[project]
name = "pykit-auth-oidc"
description = "OpenID Connect authentication provider"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "httpx",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pykit_auth_oidc"]
