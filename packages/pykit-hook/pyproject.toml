[project]
name = "pykit-hook"
description = "Event hooks for agentic system lifecycle — tool calls, LLM calls, turns"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "pykit-llm",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pykit_hook"]
