[project]
name = "pykit-anthropic"
description = "Anthropic vendor module — LLM provider for Claude API"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "httpx",
    "pykit-llm",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pykit_anthropic"]
