[project]
name = "pykit-storage"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "aiofiles",
    "pykit-errors",
    "pykit-component",
]

[project.optional-dependencies]
s3 = ["aioboto3"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pykit_storage"]
