[project]
name = "pykit-sse"
description = "Server-Sent Events support"
version = "0.1.0"
readme = "README.md"
license = { text = "MIT" }
keywords = ["sse", "server-sent-events", "streaming", "http"]
requires-python = ">=3.13"
dependencies = [
    "pykit-errors",
    "pykit-component",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pykit_sse"]
