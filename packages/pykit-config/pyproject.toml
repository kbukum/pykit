[project]
name = "pykit-config"
description = "Configuration framework using Pydantic Settings with environment variable support"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "pydantic",
    "pydantic-settings",
    "python-dotenv",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pykit_config"]
