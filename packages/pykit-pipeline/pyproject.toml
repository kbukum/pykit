[project]
name = "pykit-pipeline"
description = "Composable, pull-based async data pipelines"
version = "0.1.0"
readme = "README.md"
license = { text = "MIT" }
keywords = ["pipeline", "async", "data", "stream"]
requires-python = ">=3.13"
dependencies = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pykit_pipeline"]
