[project]
name = "pykit-vectorstore"
description = "Vector store abstraction for similarity search"
version = "0.1.0"
readme = "README.md"
license = { text = "MIT" }
keywords = ["vectorstore", "similarity-search", "embeddings", "ai"]
requires-python = ">=3.13"
dependencies = [
    "numpy",
]

[project.optional-dependencies]
qdrant = ["qdrant-client"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pykit_vectorstore"]
