[project]
name = "pykit-agent"
description = "Agent loop with tool execution, hooks, and context management"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "pykit-llm",
    "pykit-tool",
    "pykit-hook",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pykit_agent"]
