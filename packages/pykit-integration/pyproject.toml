[project]
name = "pykit-integration"
version = "0.1.0"
readme = "README.md"
license = { text = "MIT" }
keywords = ["integration", "testing", "cross-layer"]
requires-python = ">=3.13"
description = "Cross-layer integration tests for pykit"
dependencies = [
    "pykit-errors",
    "pykit-validation",
    "pykit-config",
    "pykit-logging",
    "pykit-provider",
    "pykit-pipeline",
    "pykit-di",
    "pykit-component",
    "pykit-bootstrap",
    "pykit-resilience",
    "pykit-auth",
    "pykit-authz",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pykit_integration"]
