[project]
name = "pykit-vector-store"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "numpy",
]

[project.optional-dependencies]
qdrant = ["qdrant-client"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pykit_vector_store"]
