[project]
name = "pykit-auth"
description = "Authentication primitives for JWT, API keys, OIDC, and passwords"
version = "0.1.0"
readme = "README.md"
license = { text = "MIT" }
keywords = ["auth", "jwt", "apikey", "oidc", "password", "security"]
requires-python = ">=3.13"
dependencies = [
    "argon2-cffi>=25.1.0",
    "bcrypt",
    "cryptography>=44.0",
    "httpx>=0.28",
    "pyjwt",
    "pykit-errors",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pykit_auth"]

[project.optional-dependencies]
dev = ["hypothesis>=6"]
