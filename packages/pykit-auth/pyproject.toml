[project]
name = "pykit-auth"
description = "JWT authentication and password hashing"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "pyjwt",
    "bcrypt",
    "pykit-errors",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pykit_auth"]
