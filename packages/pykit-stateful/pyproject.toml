[project]
name = "pykit-stateful"
description = "Stateful processing and state management"
version = "0.1.0"
readme = "README.md"
license = { text = "MIT" }
keywords = ["state", "stateful", "processing"]
requires-python = ">=3.13"
dependencies = [
    "pykit-errors",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pykit_stateful"]
