[project]
name = "pykit-observability"
description = "OpenTelemetry tracing, metrics, and context propagation"
version = "0.1.0"
readme = "README.md"
license = { text = "MIT" }
keywords = ["opentelemetry", "tracing", "metrics", "observability"]
requires-python = ">=3.13"
dependencies = [
    "opentelemetry-api",
    "opentelemetry-sdk",
    "opentelemetry-exporter-otlp-proto-http>=0.43b0",
    "prometheus-client",
    "pykit-errors",
    "pykit-component",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pykit_observability"]
