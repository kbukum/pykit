[project]
name = "pykit"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "pykit-errors",
    "pykit-config",
    "pykit-logging",
    "pykit-provider",
    "pykit-pipeline",
    "pykit-server",
    "pykit-metrics",
    "pykit-testutil",
    "pykit-triton",
    "pykit-dataset",
    "pykit-bench",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pykit"]
