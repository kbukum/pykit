name: Bench

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bench:
    name: Benchmarks (smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e  # v6
      - name: Install dependencies
        run: uv sync --all-packages
      - name: Run benchmarks (smoke)
        run: |
          uv run pytest -m benchmark -p no:xdist -o "addopts=--tb=short -q --import-mode=importlib" --no-header || status=$?
          if [ "${status:-0}" -eq 5 ]; then
            echo "No benchmark markers found yet"
          elif [ "${status:-0}" -ne 0 ]; then
            exit "$status"
          fi
