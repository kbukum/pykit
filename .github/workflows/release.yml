name: Release

on:
  push:
    tags:
      - "*/v[0-9]*"    # matches pykit-errors/v0.2.0, pykit-auth/v1.0.0, etc.
      - "v[0-9]*"      # matches v0.1.0 (workspace-wide release)

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    outputs:
      package-name: ${{ steps.meta.outputs.package-name }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e  # v6

      - name: Determine package from tag
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" == */* ]]; then
            # Per-package tag: pykit-errors/v0.2.0
            PKG=$(echo "$TAG" | cut -d/ -f1)
          else
            # Workspace-wide tag: v0.1.0 — build all
            PKG=""
          fi
          echo "package-name=$PKG" >> "$GITHUB_OUTPUT"
          echo "Building package: ${PKG:-'(all)'}"

      - name: Build package(s)
        run: |
          PKG="${{ steps.meta.outputs.package-name }}"
          if [[ -n "$PKG" ]]; then
            uv build --package "$PKG" --out-dir dist/
          else
            # Workspace-wide: build every package
            for pkg_dir in packages/*/; do
              pkg=$(basename "$pkg_dir")
              uv build --package "$pkg" --out-dir dist/
            done
          fi

      - name: Store built distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: [build]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write
      id-token: write       # PyPI Trusted Publishing (OIDC)
      attestations: write   # Build provenance
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Generate build provenance attestations
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be  # v2
        with:
          subject-path: dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        # Uses OIDC Trusted Publishing — no API token needed.
        # Configure at: https://pypi.org/manage/account/publishing/

  github-release:
    name: Create GitHub release
    needs: [publish-pypi]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Generate SBOM
        uses: anchore/sbom-action@f325610c9f50a54015d37c8d16cb3b0e2c8f4de1  # v0.18.0
        with:
          path: dist/
          output-file: sbom.cyclonedx.json
          format: cyclonedx-json

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "Release $TAG" \
            --generate-notes \
            dist/* sbom.cyclonedx.json
