name: Release

on:
  push:
    tags:
      - "*/v[0-9]*"    # matches pykit-errors/v0.2.0, pykit-auth/v1.0.0, etc.
      - "v[0-9]*"      # matches v0.1.0 (workspace-wide release)

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    outputs:
      package-name: ${{ steps.meta.outputs.package-name }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff  # v6

      - name: Determine package from tag
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" == */* ]]; then
            # Per-package tag: pykit-errors/v0.2.0
            PKG=$(echo "$TAG" | cut -d/ -f1)
          else
            # Workspace-wide tag: v0.1.0 — build all
            PKG=""
          fi
          echo "package-name=$PKG" >> "$GITHUB_OUTPUT"
          echo "Building package: ${PKG:-'(all)'}"

      - name: Build package(s)
        run: |
          PKG="${{ steps.meta.outputs.package-name }}"
          if [[ -n "$PKG" ]]; then
            uv build --package "$PKG" --out-dir dist/
          else
            # Workspace-wide: build every package
            for pkg_dir in packages/*/; do
              pkg=$(basename "$pkg_dir")
              uv build --package "$pkg" --out-dir dist/
            done
          fi

      - name: Store built distributions
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: [build]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write
      id-token: write       # PyPI Trusted Publishing (OIDC)
      attestations: write   # Build provenance
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Download distributions
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: dist
          path: dist/

      - name: Generate build provenance attestations
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45  # v2
        with:
          subject-path: dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@76f52bc884231f62b9a034ebfe128415bbaabdfc  # v1.12.4
        # Uses OIDC Trusted Publishing — no API token needed.
        # Configure at: https://pypi.org/manage/account/publishing/

  github-release:
    name: Create GitHub release
    needs: [publish-pypi]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Download distributions
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: dist
          path: dist/

      - name: Generate SBOM
        uses: anchore/sbom-action@f325610c9f50a54015d37c8d16cb3b0e2c8f4de1  # v0.18.0
        with:
          path: dist/
          output-file: sbom.cyclonedx.json
          format: cyclonedx-json

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "Release $TAG" \
            --generate-notes \
            dist/* sbom.cyclonedx.json
