name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Format check (fast gate)
  # ---------------------------------------------------------------------------
  format:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e  # v6
      - run: uv sync --all-packages --no-progress
      - run: uv run ruff format --check packages/

  # ---------------------------------------------------------------------------
  # Lint — code quality
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e  # v6
      - run: uv sync --all-packages --no-progress
      - run: uv run ruff check packages/

  # ---------------------------------------------------------------------------
  # Type check — strict mypy on opted-in packages
  # ---------------------------------------------------------------------------
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e  # v6
      - run: uv sync --all-packages --no-progress
      - run: uv run mypy

  # ---------------------------------------------------------------------------
  # Test — pytest with coverage (fail_under = 85 configured in pyproject.toml)
  # ---------------------------------------------------------------------------
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e  # v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --all-packages --no-progress
      - name: Verify lockfile is up-to-date
        run: uv lock --check
        continue-on-error: true
      - run: uv run pytest --cov --cov-report=xml --cov-report=term-missing
      - name: Upload coverage
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2  # v5
        with:
          files: coverage.xml
          flags: python-${{ matrix.python-version }}
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ---------------------------------------------------------------------------
  # Architecture — layer dependency compliance via import-linter
  # ---------------------------------------------------------------------------
  architecture:
    name: Architecture
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e  # v6
      - run: uv sync --all-packages --no-progress
      - run: uv run import-linter

  # ---------------------------------------------------------------------------
  # Gate: Aggregate status for branch protection
  # ---------------------------------------------------------------------------
  ci-status:
    name: CI Status
    if: always()
    needs: [format, lint, typecheck, test, architecture]
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate results
        run: |
          results=(
            "${{ needs.format.result }}"
            "${{ needs.lint.result }}"
            "${{ needs.typecheck.result }}"
            "${{ needs.test.result }}"
            "${{ needs.architecture.result }}"
          )
          for r in "${results[@]}"; do
            if [[ "$r" == "failure" || "$r" == "cancelled" ]]; then
              echo "::error::CI failed — one or more jobs did not succeed."
              exit 1
            fi
          done
          echo "All CI checks passed ✓"
