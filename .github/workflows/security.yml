name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * 1'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: github/codeql-action/init@e46ed2cbd01164d986452f91f178727624ae40d7  # v3
        with:
          languages: python
          queries: security-and-quality
      - uses: github/codeql-action/analyze@e46ed2cbd01164d986452f91f178727624ae40d7  # v3

  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
      - name: Export requirements
        run: uv export --only-group dev --format requirements-txt --no-emit-workspace > /tmp/reqs.txt
      - name: Run pip-audit
        run: uvx pip-audit -r /tmp/reqs.txt --strict --vulnerability-service osv

  bandit:
    name: Bandit SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
      - run: uv sync --only-group dev
      - name: Run bandit
        run: uv run bandit -lll -iii -r packages/ -f json -o bandit-report.json
        continue-on-error: true
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json
