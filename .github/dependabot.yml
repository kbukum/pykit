version: 2
updates:
  # ── GitHub Actions ──────────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "ci"
    groups:
      actions:
        patterns:
          - "*"

  # ── Python (uv / pip) — workspace root + every package ──────────────────────
  # The wildcard glob auto-discovers packages so new ones are picked up
  # without editing this file.
  - package-ecosystem: "pip"
    directories:
      - "/"                  # root pyproject.toml
      - "/packages/*"        # every workspace package
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
      - "python"
    open-pull-requests-limit: 15
    cooldown:
      default-days: 3
      semver-major-days: 14
      semver-minor-days: 7
    groups:
      pydantic:
        patterns:
          - "pydantic"
          - "pydantic-*"
          - "pydantic_*"
      otel:
        patterns:
          - "opentelemetry-*"
      grpc:
        patterns:
          - "grpcio"
          - "grpcio-*"
          - "protobuf"
      sqlalchemy:
        patterns:
          - "sqlalchemy"
          - "asyncpg"
          - "alembic"
      aws:
        patterns:
          - "boto3"
          - "botocore"
          - "aiobotocore"
      tooling:
        patterns:
          - "ruff"
          - "mypy"
          - "pytest"
          - "pytest-*"
          - "import-linter"
          - "pip-audit"
      # Security updates always ship in their own PR (fast lane).
      security-updates:
        applies-to: security-updates
        patterns:
          - "*"
