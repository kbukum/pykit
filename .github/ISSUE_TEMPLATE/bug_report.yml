name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below.

  - type: input
    id: package
    attributes:
      label: Package
      description: Which pykit package is affected? (e.g. `pykit-errors`, `pykit-server`)
      placeholder: pykit-<name>
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Package version
      description: Output of `uv pip show pykit-<name> | grep Version`
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      description: Output of `python --version`
      placeholder: "3.13.1"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS / platform
      placeholder: macOS 14.5 / Ubuntu 24.04 / Windows 11
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: A minimal, self-contained code snippet that reproduces the issue.
      render: python
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / tracebacks
      render: shell

  - type: checkboxes
    id: terms
    attributes:
      label: Confirmation
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
        - label: I have read the [Code of Conduct](https://github.com/kbukum/pykit/blob/main/CODE_OF_CONDUCT.md).
          required: true
