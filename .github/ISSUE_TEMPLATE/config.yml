# https://docs.github.com/en/communities/using-templates-to-encourage-useful-issues-and-pull-requests/configuring-issue-templates-for-your-repository
blank_issues_enabled: false
contact_links:
  - name: Question or discussion
    url: https://github.com/kbukum/pykit/discussions
    about: Ask a question, propose an idea, or share usage patterns.
  - name: Security vulnerability
    url: https://github.com/kbukum/pykit/security/advisories/new
    about: Report security issues privately via GitHub Security Advisories. Do NOT open a public issue.
  - name: Sibling project — gokit (Go)
    url: https://github.com/kbukum/gokit/issues
    about: For issues specific to the Go sibling.
  - name: Sibling project — rskit (Rust)
    url: https://github.com/kbukum/rskit/issues
    about: For issues specific to the Rust sibling.
