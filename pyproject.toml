[tool.importlinter]
root_packages = [
    "pykit",
    "pykit_errors", "pykit_config", "pykit_logging",
    "pykit_validation", "pykit_encryption", "pykit_util", "pykit_version", "pykit_media",
    "pykit_provider", "pykit_component", "pykit_resilience", "pykit_schema",
    "pykit_di", "pykit_bootstrap", "pykit_observability", "pykit_security",
    "pykit_hook", "pykit_mcp", "pykit_chain",
    "pykit_pipeline", "pykit_dag", "pykit_worker", "pykit_sse", "pykit_stateful",
    "pykit_auth", "pykit_authz", "pykit_auth_oidc", "pykit_auth_apikey",
    "pykit_database", "pykit_redis", "pykit_storage", "pykit_messaging", "pykit_httpclient",
    "pykit_server", "pykit_grpc", "pykit_server_middleware", "pykit_kafka_middleware",
    "pykit_llm", "pykit_triton", "pykit_bench", "pykit_dataset",
    "pykit_embedding", "pykit_vector_store", "pykit_llm_providers", "pykit_explain",
    "pykit_transcription",
    "pykit_agent", "pykit_discovery", "pykit_workload", "pykit_process",
    "pykit_testutil", "pykit_metrics", "pykit_integration", "pykit_tool",
]

[[tool.importlinter.contracts]]
name = "Layer architecture"
type = "layers"
layers = [
    "pykit_agent | pykit_discovery | pykit_workload | pykit_process | pykit_testutil | pykit_metrics | pykit_integration",
    "pykit_llm | pykit_triton | pykit_bench | pykit_dataset | pykit_transcription | pykit_embedding | pykit_vector_store | pykit_llm_providers | pykit_explain",
    "pykit_server | pykit_grpc | pykit_server_middleware | pykit_kafka_middleware",
    "pykit_database | pykit_redis | pykit_storage | pykit_messaging | pykit_httpclient",
    "pykit_auth | pykit_authz | pykit_security | pykit_auth_oidc | pykit_auth_apikey",
    "pykit_pipeline | pykit_dag | pykit_worker | pykit_sse | pykit_stateful",
    "pykit_di | pykit_bootstrap | pykit_observability | pykit_hook | pykit_mcp | pykit_chain",
    "pykit_provider | pykit_component | pykit_resilience | pykit_schema",
    "pykit_validation | pykit_encryption | pykit_util | pykit_version | pykit_media",
    "pykit_errors | pykit_config | pykit_logging",
]

[tool.bandit]
targets = ["packages"]
recursive = true
skips = ["B101"]  # assert_used — allowed in tests
